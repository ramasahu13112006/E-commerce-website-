<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic NeoShop</title>
    <!-- Vercel/Vite styling fix: Sahi local path mapping -->
    <link rel="stylesheet" href="/src/index.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <nav class="navbar">
        <div class="logo">⚡ NeoShop</div>
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="Search product name..." oninput="handleSearch()">
        </div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <!-- Is container ke andar hi React ka App render hoga -->
    <div id="root"></div>

    <!-- Vite standard dynamic loading entry script -->
    <script type="module" src="/src/App.jsx"></script>
</body>
</html>
